services:
  app:
    build:
      context: .
    container_name: innersense_app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mariadb:11.4
    container_name: innersense_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: innersense
      MARIADB_USER: innersense_user
      MARIADB_PASSWORD: innersense_pass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
